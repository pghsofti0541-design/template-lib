<!doctype html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">
    <title>게시판 목록 패턴</title>
    <link rel="stylesheet" href="../../resources/css/common.css">
    <link rel="stylesheet" href="../../resources/css/board.css">
    <link rel="stylesheet" href="../../resources/css/sample.css">
</head>

<body class="pattern_guide_body">
    <div id="skip-nav">
        <a href="#container">본문 바로가기</a>
    </div>

    <main id="container" class="pattern_board_page">
        <!-- board list copy start -->
        <section class="board_wrap" aria-labelledby="boardTitle">
            <h1 id="boardTitle" class="board_page_title">공지사항</h1>

            <div class="board_search">
                <form action="#" method="get">
                    <fieldset>
                        <legend class="sr-only">게시물 검색</legend>
                        <div class="board_search_row">
                            <label for="searchType" class="sr-only">검색 분류</label>
                            <div class="board_select">
                                <select id="searchType" name="searchType">
                                    <option value="title">제목</option>
                                    <option value="content">내용</option>
                                    <option value="all">제목+내용</option>
                                    <option value="writer">작성자</option>
                                </select>
                            </div>

                            <label for="searchKeyword" class="sr-only">검색어</label>
                            <input type="text" id="searchKeyword" name="searchKeyword" placeholder="검색어를 입력하세요">

                            <button type="submit" class="board_btn">검색</button>
                        </div>
                    </fieldset>
                </form>
            </div>

            <div class="board_head">
                <p class="board_count">전체 <strong>40</strong>건, 현재 <strong>1</strong>/<strong>4</strong>페이지</p>
                <div class="board_sort">
                    <label for="pageSize" class="sr-only">목록 개수</label>
                    <select id="pageSize" name="pageSize">
                        <option value="10">10개씩 보기</option>
                        <option value="20">20개씩 보기</option>
                        <option value="50">50개씩 보기</option>
                    </select>
                </div>
            </div>

            <div class="board_table_wrap">
                <table class="board_table">
                    <caption>공지사항 목록 - 번호, 제목, 첨부, 작성자, 작성일 정보 제공</caption>
                    <colgroup>
                        <col class="col_num">
                        <col>
                        <col class="col_file">
                        <col class="col_writer">
                        <col class="col_date">
                    </colgroup>
                    <thead>
                        <tr>
                            <th scope="col">번호</th>
                            <th scope="col">제목</th>
                            <th scope="col">첨부</th>
                            <th scope="col">작성자</th>
                            <th scope="col">작성일</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="board_num"><span class="board_badge">공지</span></td>
                            <td class="board_title"><a href="./view.html">2026년 상반기 주요 사업 안내</a></td>
                            <td class="board_file"><span class="board_file_icon" aria-label="첨부파일 있음">F</span></td>
                            <td class="board_writer">관리자</td>
                            <td class="board_date">2026-05-14</td>
                        </tr>
                        <tr>
                            <td class="board_num">40</td>
                            <td class="board_title"><a href="./view.html">홈페이지 서비스 점검 일정 안내</a></td>
                            <td class="board_file"><span class="board_file_icon" aria-label="첨부파일 있음">F</span></td>
                            <td class="board_writer">관리자</td>
                            <td class="board_date">2026-05-10</td>
                        </tr>
                        <tr>
                            <td class="board_num">39</td>
                            <td class="board_title"><a href="./view.html">참여 프로그램 신청 결과 발표</a></td>
                            <td class="board_file">-</td>
                            <td class="board_writer">운영자</td>
                            <td class="board_date">2026-05-02</td>
                        </tr>
                        <tr>
                            <td class="board_num">38</td>
                            <td class="board_title"><a href="./view.html">자료실 게시물 등록 안내</a></td>
                            <td class="board_file">-</td>
                            <td class="board_writer">관리자</td>
                            <td class="board_date">2026-04-28</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <nav class="board_paging" aria-label="게시판 페이지">
                <a href="#" class="board_paging_nav" aria-label="처음 페이지">처음</a>
                <a href="#" class="board_paging_nav" aria-label="이전 페이지">이전</a>
                <strong aria-current="page">1</strong>
                <a href="#">2</a>
                <a href="#">3</a>
                <a href="#" class="board_paging_nav" aria-label="다음 페이지">다음</a>
                <a href="#" class="board_paging_nav" aria-label="마지막 페이지">끝</a>
            </nav>
        </section>
        <!-- board list copy end -->
    </main>
</body>

</html>
