<!doctype html>
<html lang="ko">

<body class="pattern_guide_body">
    <div id="skip-nav">
        <a href="#container">본문 바로가기</a>

    <main id="container" class="pattern_board_page">
        <!-- gallery board view copy start -->
        <section class="board_wrap" aria-labelledby="galleryViewTitle">
            <h1 class="board_page_title">갤러리</h1>

            <article class="board_view">

                    <div class="board_view_info">

                    <div class="board_gallery_view_img">

                    <p>갤러리 게시판 상세 본문 영역입니다. 실제 이미지는 운영 전 사람이 교체하고, 템플릿 단계에서는 images/temp/ 플레이스홀더 이미지를 사용합니다.</p>
                    <p>여러 장의 이미지가 필요한 경우 본문 안에 이미지 블록을 추가하거나 CMS 출력 구조에 맞춰 반복 영역으로 변경합니다.</p>
                </div>

                <div class="board_files">
                    <strong>첨부파일</strong>
                    <ul>
                        <li><a href="#" download>갤러리_첨부파일.zip</a></li>
                    </ul>

            </article>

            <nav class="board_move" aria-label="이전글 다음글">
                <div class="board_move_item">
                    <strong>이전글</strong>
                    <a href="#">상반기 교육 프로그램 결과 공유회</a>
                </div>
                <div class="board_move_item">
                    <strong>다음글</strong>
                    <span>다음글이 없습니다.</span>
                </div>
            </nav>

            <div class="board_btn_wrap">
                <a href="./gal_list.html" class="board_btn secondary">목록</a>
